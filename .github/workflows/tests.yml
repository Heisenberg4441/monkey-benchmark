name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build + ctest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Linux: Vulkan SDK + lavapipe для real-shader determinism test.
      - name: Install Vulkan + lavapipe (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev glslang-tools mesa-vulkan-drivers

      # macOS: Vulkan SDK (MoltenVK) для real-shader test.
      - name: Install Vulkan SDK (macOS)
        if: runner.os == 'macOS'
        run: brew install vulkan-headers vulkan-loader glslang molten-vk

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DUSE_CUDA=OFF -DUSE_VULKAN=ON -DMONKEY_NATIVE_ARCH=OFF
          -DMONKEY_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: ctest --output-on-failure

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        working-directory: build
        run: ctest --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: ctest -C Release --output-on-failure

      - name: Smoke bench
        shell: bash
        run: |
          printf 'abc' > /tmp/ref.txt
          ./build/monkey_bench /tmp/ref.txt -d 2 --warmup 0

      - name: JSON output smoke
        shell: bash
        run: |
          printf 'abc' > /tmp/ref.txt
          ./build/monkey_bench /tmp/ref.txt -d 2 --warmup 0 --output-format json
