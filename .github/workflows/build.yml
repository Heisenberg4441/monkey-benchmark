name: Build and Release Binaries

# Запуск только при пуше тега (например, v1.0.0) 
# и при ручном запуске во вкладке Actions
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: monkey_bench_linux_x86_64
            bin_path: build/monkey_bench
            cmake_extra: -DCMAKE_EXE_LINKER_FLAGS=-static
          - os: macos-14 # Это раннеры на Apple Silicon (M1)
            artifact_name: monkey_bench_macos_arm64
            bin_path: build/monkey_bench
            cmake_extra: ""
          - os: windows-latest
            artifact_name: monkey_bench_windows_x86_64.exe
            bin_path: build/Release/monkey_bench.exe
            cmake_extra: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Релизные бинарники: без CUDA (нет GPU на раннерах) и без -march=native
      # ради портируемости на любых машинах пользователей.
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DUSE_CUDA=OFF -DNATIVE_ARCH=OFF ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifact
        run: cmake -E copy ${{ matrix.bin_path }} ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    # Необходимо для создания релиза: дефолтный GITHUB_TOKEN иначе read-only (403).
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./binaries/**/*
          fail_on_unmatched_files: true
          body: |
            🐒 Новая версия Infinite Monkey Benchmark!
            
            Скачайте бинарник для вашей ОС и архитектуры. Не требует установки или зависимостей.
            Инструкции по запуску смотрите в [README.md](README.md).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}