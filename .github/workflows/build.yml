name: Build and Release Binaries

# Запуск только при пуше тега (например, v1.0.0) 
# и при ручном запуске во вкладке Actions
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux/Windows собираются с CUDA: компиляция требует только Toolkit,
          # GPU на раннере не нужен. fat-binary покрывает Turing→Blackwell (real)
          # + PTX (virtual) для будущих карт через JIT.
          - os: ubuntu-latest
            artifact_name: monkey_bench_linux_x86_64
            bin_path: build/monkey_bench
            cuda: true
            cmake_cuda: '-DUSE_CUDA=ON "-DCMAKE_CUDA_ARCHITECTURES=75-real;80-real;86-real;89-real;90-real;120-real;120-virtual"'
          - os: macos-14 # Apple Silicon: CUDA на macOS не существует, только CPU.
            artifact_name: monkey_bench_macos_arm64
            bin_path: build/monkey_bench
            cuda: false
            cmake_cuda: '-DUSE_CUDA=OFF'
          # windows-2022 (VS2022): CUDA 12.8 поддерживает MSVC только до VS2022;
          # на windows-latest (VS2026) nvcc отказывается компилировать.
          - os: windows-2022
            artifact_name: monkey_bench_windows_x86_64.exe
            bin_path: build/monkey_bench.exe
            cuda: true
            cmake_cuda: '-DUSE_CUDA=ON "-DCMAKE_CUDA_ARCHITECTURES=75-real;80-real;86-real;89-real;90-real;120-real;120-virtual"'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install CUDA Toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.8.1'
          method: 'network'
          use-github-cache: false
          use-local-cache: false

      # Vulkan SDK для второго GPU-бэкенда (AMD/Intel/любой). Линкуем loader
      # динамически — на машине пользователя он идёт с драйвером GPU (а на
      # Windows 10+ ещё и с самой ОС), ставить ничего не нужно.
      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libvulkan-dev glslang-tools

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.3.296.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang
          vulkan-use-cache: true

      # Релизные бинарники без -march=native ради портируемости. CUDA-рантайм
      # линкуется статически (см. CMakeLists), пользователю нужен лишь драйвер.
      # Windows: генератор Ninja (VS-генератор требует MSBuild-интеграцию CUDA,
      # которой нет для свежих VS); nvcc указываем явно через CUDA_PATH, чтобы не
      # зависеть от его наличия в PATH.
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DNATIVE_ARCH=OFF -DCMAKE_CUDA_COMPILER="$env:CUDA_PATH\bin\nvcc.exe" ${{ matrix.cmake_cuda }}

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DNATIVE_ARCH=OFF ${{ matrix.cmake_cuda }}

      - name: Build
        run: cmake --build build --config Release

      - name: Stage artifact
        run: cmake -E copy ${{ matrix.bin_path }} ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    # Необходимо для создания релиза: дефолтный GITHUB_TOKEN иначе read-only (403).
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./binaries/**/*
          fail_on_unmatched_files: true
          body: |
            🐒 Infinite Monkey Benchmark

            Download the binary for your OS — no installation or dependencies required.

            - **Windows / Linux**: both GPU backends are built in. The benchmark
              picks automatically — **NVIDIA → CUDA**, any other GPU (AMD / Intel)
              **→ Vulkan** — and falls back to the CPU if no GPU is available
              (`-gpu` / `-all`, or force with `--gpu-api cuda|vulkan`). No SDK needed,
              only your normal GPU driver.
            - **macOS (Apple Silicon)**: CPU-only build (GPU support coming via
              Vulkan/MoltenVK).

            See the [README](README.md) for usage.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}