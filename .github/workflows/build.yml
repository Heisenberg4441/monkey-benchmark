name: Build and Release Binaries

# Запуск только при пуше тега (например, v1.0.0) 
# и при ручном запуске во вкладке Actions
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: monkey_benchmark_linux_x86_64
            build_cmd: g++ -O3 -march=x86-64 -mtune=generic -std=c++17 -static -pthread monkey_benchmark.cpp -o monkey_benchmark_linux_x86_64
          - os: macos-14 # Это раннеры на Apple Silicon (M1)
            artifact_name: monkey_benchmark_macos_arm64
            build_cmd: clang++ -O3 -march=armv8.5-a -std=c++17 -pthread monkey_benchmark.cpp -o monkey_benchmark_macos_arm64
          - os: windows-latest
            artifact_name: monkey_benchmark_windows_x86_64.exe
            build_cmd: cl /O2 /arch:AVX2 /std:c++17 monkey_benchmark.cpp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC Developer Command Prompt (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Rename Windows binary (if needed)
        if: runner.os == 'Windows'
        run: Rename-Item -Path monkey_benchmark.exe -NewName monkey_benchmark_windows_x86_64.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./binaries/monkey_benchmark_linux_x86_64/monkey_benchmark_linux_x86_64
            ./binaries/monkey_benchmark_macos_arm64/monkey_benchmark_macos_arm64
            ./binaries/monkey_benchmark_macos_x86_64/monkey_benchmark_macos_x86_64
            ./binaries/monkey_benchmark_windows_x86_64.exe/monkey_benchmark_windows_x86_64.exe
          body: |
            🐒 Новая версия Infinite Monkey Benchmark!
            
            Скачайте бинарник для вашей ОС и архитектуры. Не требует установки или зависимостей.
            Инструкции по запуску смотрите в [README.md](README.md).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}